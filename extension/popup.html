<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { width: 340px; font-family: -apple-system, system-ui, sans-serif; background: #ffffff; color: #1a1a1a; font-size: 13px; }
  .header { padding: 14px 16px 12px; border-bottom: 1px solid #e8e8e8; display: flex; align-items: center; gap: 8px; }
  .logo { width: 22px; height: 22px; border-radius: 5px; background: #5e6ad2; flex-shrink: 0; display: flex; align-items: center; justify-content: center; }
  .logo svg { width: 12px; height: 12px; }
  .title { font-size: 15px; font-weight: 700; letter-spacing: -0.3px; color: #1a1a1a; }
  .badge { font-size: 10px; font-weight: 600; background: #5e6ad215; color: #5e6ad2; border-radius: 9999px; padding: 2px 7px; border: 1px solid #5e6ad230; }
  .url-bar { font-size: 10px; color: #888; padding: 5px 16px; border-bottom: 1px solid #f0f0f0; background: #f8f8f8; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .section { padding: 14px 16px; border-bottom: 1px solid #f0f0f0; }
  .label { font-size: 10px; color: #888; margin-bottom: 5px; letter-spacing: 0.4px; text-transform: uppercase; font-weight: 600; }
  .val { color: #333; line-height: 1.4; font-size: 13px; }
  .val.muted { color: #bbb; font-style: italic; }
  .fields-chip { display: inline-flex; align-items: center; gap: 4px; font-size: 11px; color: #5e6ad2; background: #5e6ad210; border-radius: 9999px; padding: 2px 8px; border: 1px solid #5e6ad230; margin-top: 6px; }
  .btn { display: block; width: 100%; padding: 10px 14px; border-radius: 9px; font-size: 13px; font-weight: 600; cursor: pointer; border: none; text-align: center; transition: background .12s; }
  .btn-primary { background: #5e6ad2; color: #fff; }
  .btn-primary:hover { background: #828fff; }
  .btn-secondary { background: #f0f0f0; color: #333; border: 1px solid #e0e0e0; }
  .btn-secondary:hover { background: #e8e8e8; }
  .btn:disabled { opacity: 0.4; cursor: not-allowed; }
  .actions { padding: 14px 16px; display: flex; flex-direction: column; gap: 8px; }
  .status { padding: 10px 16px; font-size: 12px; border-top: 1px solid #f0f0f0; display: none; }
  .status.ok { color: #16a34a; background: #f0fdf4; }
  .status.err { color: #dc2626; background: #fef2f2; }
  .settings-row { display: flex; align-items: center; gap: 6px; }
  input[type=url] { background: #f8f8f8; border: 1px solid #e0e0e0; border-radius: 7px; color: #1a1a1a; font-size: 12px; padding: 6px 10px; flex: 1; outline: none; }
  input[type=url]:focus { border-color: #5e6ad2; }
  .cover-preview { font-size: 11px; color: #888; max-height: 44px; overflow: hidden; line-height: 1.5; margin-top: 4px; -webkit-mask-image: linear-gradient(to bottom, black 50%, transparent); mask-image: linear-gradient(to bottom, black 50%, transparent); }
  .ats-list { margin-top: 8px; display: flex; flex-wrap: wrap; gap: 4px; }
  .ats-chip { font-size: 10px; padding: 2px 7px; border-radius: 9999px; background: #f0f0f0; color: #666; border: 1px solid #e0e0e0; }
  .ats-chip.detected { background: #16a34a15; color: #16a34a; border-color: #16a34a30; }
  .divider { height: 1px; background: #f0f0f0; margin: 0 16px; }
</style>
</head>
<body>
<div class="header">
  <div class="logo">
    <svg viewBox="0 0 12 12" fill="none"><path d="M2 6h8M6 2v8" stroke="white" stroke-width="2" stroke-linecap="round"/></svg>
  </div>
  <span class="title">JobTrackr</span>
  <span class="badge">Auto-Fill</span>
</div>
<div class="url-bar" id="current-url">Loading…</div>

<div class="section" id="resume-section">
  <div class="label">Resume on file</div>
  <div class="val muted" id="resume-name">Not loaded</div>
</div>

<div class="section" id="cover-section" style="display:none">
  <div class="label">Cover letter <span style="color:#16a34a;font-weight:600;">✓ ready</span></div>
  <div class="cover-preview" id="cover-preview"></div>
</div>

<div class="section">
  <div class="label">Detected platform</div>
  <div class="val muted" id="platform-name">Scanning…</div>
  <div class="ats-list">
    <span class="ats-chip" id="chip-linkedin">LinkedIn</span>
    <span class="ats-chip" id="chip-indeed">Indeed</span>
    <span class="ats-chip" id="chip-workday">Workday</span>
    <span class="ats-chip" id="chip-greenhouse">Greenhouse</span>
    <span class="ats-chip" id="chip-lever">Lever</span>
    <span class="ats-chip" id="chip-naukri">Naukri</span>
    <span class="ats-chip" id="chip-other">Other</span>
  </div>
  <div class="fields-chip" id="fields-found" style="display:none">
    <svg width="10" height="10" viewBox="0 0 10 10" fill="none"><circle cx="5" cy="5" r="4" stroke="#5e6ad2" stroke-width="1.5"/><path d="M5 3v2.5L6.5 7" stroke="#5e6ad2" stroke-width="1.2" stroke-linecap="round"/></svg>
    <span id="fields-count">0 fields detected</span>
  </div>
</div>

<div class="section">
  <div class="label">JobTrackr URL</div>
  <div class="settings-row">
    <input type="url" id="api-url" placeholder="https://jobtrackr-steel.vercel.app" />
  </div>
</div>

<div class="actions">
  <button class="btn btn-primary" id="btn-fill" disabled>⚡ Auto-fill form</button>
  <button class="btn btn-secondary" id="btn-copy-cover" style="display:none">📋 Copy cover letter</button>
  <button class="btn btn-secondary" id="btn-open">Open JobTrackr</button>
</div>

<div class="status" id="status"></div>

<script src="popup.js"></script>
</body>
</html>
